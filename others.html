        .container { max-width: 500px; margin: 0 auto; background-color: #b5c8bf; }

        .form-group.has-error .error-message { display: block; }

        }
        input#zipcode { width: 45%; }

        input::placeholder, textarea::placeholder { color: #bfbfbf; font-size: 15px; }
